        priority_level: 2
      - source_name: "CESMD"
        domain: "acelerografia"
        category: "acelerografia"
        site: "https://www.strongmotioncenter.org"
        api_or_access: "Center for Engineering Strong Motion Data"
        data_types: ["acelerogramas", "espectros_de_respuesta", "pga", "pgv"]
        usage: ["registros_instrumentales", "calibracion_de_respuesta"]
        target_layer: "C_accelerography"
        priority_level: 2
      - source_name: "Nevada Geodetic Laboratory"
        domain: "gnss_geodesia"
        category: "gnss_y_geodesia"
        site: "http://geodesy.unr.edu"
        api_or_access: "servicios geodesicos NGL"
        data_types: ["desplazamiento_milimetrico", "movimiento_de_placas"]
        usage: ["deformacion_cortical", "desplazamientos_gnss"]
        target_layer: "D_geodesy"
        priority_level: 3
      - source_name: "UNAVCO / EarthScope"
        domain: "gnss_geodesia"
        category: "gnss_y_geodesia"
        site: "https://www.unavco.org"
        api_or_access: "portales y archivos geodesicos"
        data_types: ["gnss", "geodesia", "deformacion_cortical"]
        usage: ["desplazamientos", "deformacion_regional"]
        target_layer: "D_geodesy"
        priority_level: 3
      - source_name: "FUNVISIS"
        domain: "catalogo_sismico_nacional"
        category: "venezuela"
        site: "https://www.funvisis.gob.ve"
        api_or_access: "https://www.funvisis.gob.ve/maravilla.json"
        data_types: ["catalogo_sismico_nacional", "fallas_activas", "intensidades", "informacion_historica"]
        usage: ["venezuela_2026", "cariaco_1997", "el_pilar", "bocono", "san_sebastian", "monitoreo_reciente", "etl_incremental"]
        target_layer: "A_tectonic"
        priority_level: 1
      - source_name: "NOAA"
        domain: "oceanografia"
        category: "oceanografia"
        site: "https://www.noaa.gov"
        api_or_access: "https://api.tidesandcurrents.noaa.gov"
        data_types: ["mareas", "tsunamis", "sst", "presion_atmosferica"]
        usage: ["forzantes_oceanicos", "tsunami", "sst"]
        target_layer: "B_geophysical"
