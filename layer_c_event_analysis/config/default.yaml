        usage: ["variables_satelitales", "humedad_de_suelo", "cambios_gravitacionales", "observacion_terrestre"]
        target_layer: "B_geophysical"
        priority_level: 3

reference:
  document_path: "docs/H04_Hipotesis_Superposicion_Energia_Venezuela_2026.md"

event:
  event_id: "venezuela_2026_06_24_h04"
  name: "Terremoto de Venezuela del 24-Jun-2026"
  date_utc: "2026-06-24"

analysis_axes:
  - "superposicion temporal de ondas"
  - "directividad de ruptura"
  - "amplificacion local por efectos de sitio"
  - "geometria de fallas activadas"
  - "interaccion con estructuras geologicas regionales"

hypotheses:
  - hypothesis_id: "H-04-A"
    label: "Superposicion temporal"
    statement: "Dos eventos principales separados por aproximadamente 35-40 segundos pudieron generar superposicion parcial de campos de ondas sismicas."
    status: "en evaluacion"
    focus: "sincronizacion temporal y energia combinada"
  - hypothesis_id: "H-04-B"
    label: "Directividad y amplificacion"
    statement: "La directividad de ruptura, la amplificacion por efecto de sitio y la resonancia local pudieron reforzar la distribucion no uniforme de danos."
    status: "en evaluacion"
    focus: "patron direccional del dano"
  - hypothesis_id: "H-04-C"
    label: "Comparacion historica Cariaco 1997"
    statement: "El evento 24-Jun-2026 debe compararse con Cariaco 1997 para buscar similitudes estructurales y de propagacion."
    status: "en evaluacion"
    focus: "analogia historica"

evidence_lines:
  - evidence_id: "EV-01"
    evidence_type: "catalogo sismico"
    target: "tiempos de origen, magnitudes, profundidades, replicas y mecanismo focal"
    priority: "alta"
    source_candidates: ["FUNVISIS", "USGS", "EMSC", "ISC", "IRIS"]
  - evidence_id: "EV-02"
    evidence_type: "acelerografia"
    target: "PGA, PGV, componentes N-S/E-W/Vertical y espectros de respuesta"
    priority: "alta"
    source_candidates: ["redes acelerograficas", "estaciones locales"]
  - evidence_id: "EV-03"
    evidence_type: "geologia y geotecnia"
    target: "fallas activas, mapas geologicos, suelos, litologia y perfiles geotecnicos"
    priority: "alta"
    source_candidates: ["cartografia geologica", "microzonificacion", "estudios geotecnicos"]
  - evidence_id: "EV-04"
    evidence_type: "satelital"
    target: "deformacion y contexto superficial con Sentinel-1, Sentinel-2, Landsat y Planet Labs"
    priority: "media"
    source_candidates: ["Sentinel-1", "Sentinel-2", "Landsat", "Planet Labs"]
  - evidence_id: "EV-05"
    evidence_type: "comparacion historica"
    target: "catalogo, replicas, danos y estudios de amplificacion del terremoto de Cariaco 1997"
    priority: "media"
    source_candidates: ["FUNVISIS", "publicaciones cientificas", "fotografias historicas"]

scientific_questions:
  - question_id: "Q1"
    question: "Existio superposicion temporal significativa entre ambos eventos de 2026?"
    analysis_axis: "superposicion temporal de ondas"
  - question_id: "Q2"
    question: "La distribucion de danos sigue un patron radial o direccional?"
    analysis_axis: "directividad de ruptura"
  - question_id: "Q3"
    question: "Existe correlacion entre danos y tipo de suelo?"
    analysis_axis: "amplificacion local"
  - question_id: "Q4"
    question: "La geometria de ruptura favorecio una direccion dominante de propagacion?"
    analysis_axis: "geometria de fallas"
  - question_id: "Q5"
    question: "Las ondas superficiales fueron responsables de los mayores desplazamientos observados?"
    analysis_axis: "interaccion con estructuras regionales"
  - question_id: "Q6"
    question: "Existen similitudes estructurales con Cariaco 1997?"
    analysis_axis: "comparacion historica"
  - question_id: "Q7"
    question: "Puede construirse un modelo fisico capaz de reproducir la distribucion observada de danos?"
    analysis_axis: "sintesis fisica"

validation_criterion: "La hipotesis solo puede respaldarse mediante evidencia convergente de registros sismicos, acelerograficos, geologia, satelites, modelado numerico y comparacion historica."