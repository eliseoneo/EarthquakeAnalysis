      - source_name: "Copernicus Marine Service"
        domain: "oceanografia"
        category: "oceanografia"
        site: "https://marine.copernicus.eu"
        api_or_access: "servicios marinos Copernicus"
        data_types: ["temperatura_superficial_del_mar", "corrientes", "oleaje", "variables_oceanicas"]
        usage: ["sst", "corrientes", "oleaje"]
        target_layer: "B_geophysical"
        priority_level: 3
      - source_name: "ECMWF"
        domain: "meteorologia"
