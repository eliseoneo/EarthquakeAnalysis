project:
  title: "Hipotesis H04 - Superposicion de Energia Venezuela 2026"
  analysis_scope: "analisis del evento"
  projection_mode: false

data_sources:
  accelerography:
    raw_station_path: "layer_c_event_analysis/data/raw/accelerography/accelerography_station_records.json"
    raw_station_csv_path: "layer_c_event_analysis/data/raw/accelerography/accelerography_station_records.csv"
    bootstrap_path: "layer_c_event_analysis/data/raw/accelerography/accelerography_station_estimates.json"
  funvisis:
    official_dump_path: "layer_c_event_analysis/data/raw/funvisis/catalog_funvisis_official.json"
    endpoint: "https://www.funvisis.gob.ve/maravilla.json"
    timeout_seconds: 20
    fallback_provider: "USGS"
    response_format: "feature_collection_recent_events"
    historical_scope: "recent_events_only"
    documented_filters: false
  external_source_registry:
    reference_document: "docs/EarthquakeAnalysis_DataSources_v1/docs/00_Master_Data_Catalog.md"
    priority_tiers:
      level_1: ["FUNVISIS", "USGS", "ISC", "GCMT"]
      level_2: ["IRIS", "ORFEUS", "EIDA", "ESM", "CESMD"]
      level_3: ["NOAA", "Copernicus Marine Service", "ECMWF", "NASA EarthData"]
    sources:
      - source_name: "USGS"
        domain: "catalogo_sismico"
        category: "catalogos_sismicos_globales"
        site: "https://earthquake.usgs.gov"
        api_or_access: "https://earthquake.usgs.gov/fdsnws/event/1/"
        data_types: ["magnitud", "profundidad", "epicentro", "tiempo_utc", "shakemap", "replicas", "mecanismos_focales"]
        usage: ["base_global_de_eventos", "entrenamiento_de_modelos", "comparaciones_historicas"]
        target_layer: "A_tectonic"
        priority_level: 1
      - source_name: "ISC"
        domain: "catalogo_sismico"
        category: "catalogos_sismicos_globales"
        site: "https://www.isc.ac.uk"
        api_or_access: "catalogos historicos y revisiones cientificas"
        data_types: ["catalogos_historicos", "localizaciones_refinadas", "revisiones_cientificas"]
        usage: ["estudios_de_largo_plazo", "series_temporales_mayores_a_25_anios"]
        target_layer: "A_tectonic"
        priority_level: 1
      - source_name: "EMSC"
        domain: "catalogo_sismico"
        category: "catalogos_sismicos_globales"
        site: "https://www.emsc-csem.org"
        api_or_access: "portal web y feeds institucionales"
        data_types: ["eventos_sismicos_europeos", "intensidades_observadas", "reportes_ciudadanos"]
        usage: ["comparacion_de_intensidades", "corroboracion_de_reportes"]
        target_layer: "A_tectonic"
        priority_level: 2
      - source_name: "GCMT"
        domain: "mecanismo_focal"
        category: "catalogos_sismicos_globales"
        site: "https://www.globalcmt.org"
        api_or_access: "catalogo CMT global"
        data_types: ["tensor_de_momento", "tipo_de_falla", "orientacion_de_ruptura", "energia_liberada"]
        usage: ["mecanismos_focales", "energia_sismica", "analisis_de_ruptura"]
        target_layer: "A_tectonic"
        priority_level: 1
      - source_name: "IRIS"
        domain: "formas_de_onda"
        category: "redes_sismograficas_mundiales"
        site: "https://service.iris.edu/fdsnws/"
        api_or_access: "FDSN waveform services"
        data_types: ["formas_de_onda", "miniseed", "sac", "redes_sismicas_globales"]
        usage: ["ondas_p", "ondas_s", "fft", "energia_espectral"]
        target_layer: "A_tectonic"
        priority_level: 2
      - source_name: "ORFEUS"
        domain: "formas_de_onda_y_gnss"
        category: "redes_sismograficas_mundiales"
        site: "https://orfeus-eu.org"
        api_or_access: "servicios de redes europeas"
        data_types: ["redes_sismicas_europeas", "gnss", "formas_de_onda"]
        usage: ["contraste_europeo", "formas_de_onda", "deformacion"]
        target_layer: "D_geodesy"
        priority_level: 2
      - source_name: "EIDA"
        domain: "acelerografia"
        category: "acelerografia"
        site: "https://www.orfeus-eu.org/data/eida/"
        api_or_access: "archivo integrado europeo"
        data_types: ["acelerometros", "sismometros", "formas_de_onda"]
        usage: ["registros_instrumentales", "comparacion_internacional"]
        target_layer: "C_accelerography"
        priority_level: 2
      - source_name: "ESM"
        domain: "acelerografia"
        category: "acelerografia"
        site: "https://esm-db.eu"
        api_or_access: "Engineering Strong Motion Database"
        data_types: ["pga", "pgv", "psa", "espectros_de_respuesta", "registros_acelerograficos"]
        usage: ["comparacion_con_turquia_2023", "italia", "grecia", "japon", "chile"]
