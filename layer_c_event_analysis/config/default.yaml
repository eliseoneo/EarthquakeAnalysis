        api_or_access: "ERA5 y reanalisis"
        data_types: ["temperatura", "presion", "humedad", "reanálisis_climatico"]
        usage: ["contexto_meteorologico", "reanálisis"]
        target_layer: "B_geophysical"
        priority_level: 3
      - source_name: "NASA EarthData"
        domain: "meteorologia_y_observacion_terrestre"
